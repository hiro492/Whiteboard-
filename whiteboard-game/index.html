<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>お絵かき斜面ボールゲーム雛形</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #222;
    overflow: hidden;
    font-family: sans-serif;
    color: #eee;
  }
  #toolbar {
    text-align: center;
    padding: 8px;
  }
  #toolbar button {
    font-size: 14px;
    padding: 6px 16px;
    cursor: pointer;
  }
  #toolbar p {
    margin: 4px 0 0;
    font-size: 12px;
    color: #aaa;
  }
  .file-btn {
    display: inline-block;
    font-size: 14px;
    padding: 6px 16px;
    cursor: pointer;
    background: #eee;
    color: #222;
    border-radius: 4px;
  }
  .file-btn.disabled {
    opacity: 0.5;
    pointer-events: none;
  }
  canvas {
    display: block;
    margin: 0 auto;
  }
  .row {
    margin: 6px 0;
  }
  .row label {
    margin-right: 14px;
    font-size: 13px;
  }
  .row input[type="range"] {
    vertical-align: middle;
  }
  #maskPreviewCanvas {
    position: fixed;
    top: 8px;
    right: 8px;
    width: 160px;
    height: 120px;
    border: 2px solid #666;
    background: #000;
    z-index: 10;
  }
  #cameraPreviewWrap {
    position: fixed;
    top: 8px;
    left: 8px;
    width: 480px;
    height: 360px;
    border: 2px solid #666;
    background: #000;
    z-index: 1000;
    display: none;
  }
  #cameraPreview {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
  #roiOverlayCanvas {
    position: absolute;
    top: 0;
    left: 0;
    cursor: crosshair;
  }
  #realtimeToggleBtn.active {
    background: #c0392b;
    color: #fff;
  }
  #fullscreenExitBtn {
    position: fixed;
    top: 12px;
    left: 50%;
    z-index: 2000;
    padding: 8px 20px;
    font-size: 14px;
    cursor: pointer;
    background: rgba(0, 0, 0, 0.7);
    color: #fff;
    border: 1px solid #666;
    border-radius: 6px;
    opacity: 0;
    transform: translateX(-50%) translateY(-150%);
    transition: transform 0.2s ease, opacity 0.2s ease;
    pointer-events: none;
  }
  #fullscreenExitBtn.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
    pointer-events: auto;
  }
  /* プロジェクタ調整オーバーレイ */
  #calibOverlay {
    position: fixed;
    inset: 0;
    z-index: 3000;
    display: none;
  }
  #calibOverlay.active {
    display: block;
  }
  .calib-handle {
    position: fixed;
    width: 30px;
    height: 30px;
    margin: -15px 0 0 -15px; /* left/top を中心に合わせる */
    border: 2px solid #fff;
    border-radius: 50%;
    background: rgba(255, 80, 80, 0.65);
    box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.6);
    cursor: grab;
    touch-action: none;
  }
  .calib-handle:active {
    cursor: grabbing;
  }
  .calib-handle::after {
    content: attr(data-label);
    position: absolute;
    top: 34px;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    font-size: 11px;
    color: #fff;
    text-shadow: 0 0 3px #000;
  }
  #calibToolbar {
    position: fixed;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.78);
    color: #fff;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    display: flex;
    gap: 12px;
    align-items: center;
    z-index: 3001;
  }
  #calibToolbar button {
    font-size: 13px;
    padding: 4px 12px;
    cursor: pointer;
  }
  #calibToolbar button:disabled {
    opacity: 0.5;
    cursor: default;
  }
  #calibHint {
    position: fixed;
    top: 58px;
    left: 50%;
    transform: translateX(-50%);
    max-width: 640px;
    background: rgba(0, 0, 0, 0.7);
    color: #cde;
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 11px;
    line-height: 1.5;
    text-align: center;
    z-index: 3001;
  }
  /* カメラ4隅補正のハンドル(プレビュー上に描画するのでcanvas側で処理する) */
  #roiOverlayCanvas.editing {
    cursor: grab;
  }
</style>
</head>
<body>

<div id="toolbar">
  <div class="row">
    <button id="clearBtn">クリア</button>
    <button id="fullscreenBtn">フルスクリーン</button>
    <button id="calibrateBtn">プロジェクタ調整</button>
  </div>
  <div class="row" id="projectionControls">
    投影出力:
    <select id="monitorSelect"><option value="">既定のモニター</option></select>
    <button id="refreshMonitorsBtn">モニター一覧を更新</button>
    <button id="projectFullscreenBtn">選択モニターに投影</button>
    <span id="monitorStatus" style="font-size:11px;color:#888;"></span>
  </div>
  <div class="row">
    入力ソース:
    <label><input type="radio" name="sourceMode" value="file" checked> ファイル</label>
    <label><input type="radio" name="sourceMode" value="camera"> カメラ</label>
  </div>
  <div class="row" id="fileControls">
    <label id="imageLabel" for="imageInput" class="file-btn disabled">画像を選択</label>
    <input type="file" id="imageInput" accept="image/*" style="display:none" disabled>
  </div>
  <div class="row" id="cameraControls" style="display:none">
    <select id="cameraSelect"></select>
    <button id="startCameraBtn">カメラ開始</button>
    <button id="captureCameraBtn" disabled>この映像で地形を作る</button>
    <button id="cameraCalibBtn">カメラ4隅を合わせる</button>
    <button id="cameraCalibResetBtn">カメラ補正リセット</button>
    <p style="font-size:11px;color:#888;margin:2px 0;">「カメラ4隅を合わせる」を押し、プレビュー上の4隅ハンドルをホワイトボードの角にドラッグすると、斜めからの歪みを長方形に補正します</p>
    <p id="cameraStatus"></p>
    <div>
      <button id="realtimeToggleBtn" disabled>リアルタイム開始</button>
      <label>検出間隔: <input type="range" id="realtimeIntervalSlider" min="0.5" max="3" step="0.5" value="1"> <span id="realtimeIntervalValue">1.0</span>秒</label>
    </div>
    <p id="realtimeStatus">リアルタイム: 停止中</p>
  </div>
  <div class="row">
    <label>検出方式:
      <select id="methodSelect">
        <option value="hsv">黒ペン検出(HSVマスク)</option>
        <option value="classic">グレースケール適応的二値化</option>
      </select>
    </label>
  </div>
  <div class="row" id="hsvControls">
    <label>彩度上限(S): <input type="range" id="satMaxSlider" min="0" max="255" value="100"> <span id="satMaxValue">100</span></label>
    <label>明度上限(V): <input type="range" id="valMaxSlider" min="0" max="255" value="130"> <span id="valMaxValue">130</span></label>
  </div>
  <div class="row">
    <label>最小輪郭長: <input type="range" id="minLengthSlider" min="0" max="2000" value="0"> <span id="minLengthValue">0</span></label>
    <label>最小輪郭面積: <input type="range" id="minAreaSlider" min="0" max="2000" step="10" value="50"> <span id="minAreaValue">50</span></label>
    <label><input type="checkbox" id="morphOpenToggle" checked> ノイズ除去(OPEN)を使う</label>
  </div>
  <div class="row">
    <label>膨張回数(dilate): <input type="range" id="dilateIterSlider" min="0" max="3" value="1"> <span id="dilateIterValue">1</span></label>
    <label>CLOSEカーネルサイズ: <input type="range" id="closeKernelSlider" min="3" max="15" step="2" value="11"> <span id="closeKernelValue">11</span></label>
  </div>
  <div class="row">
    <label>差分しきい値(変化なし判定): <input type="range" id="diffThresholdSlider" min="0" max="5000" step="50" value="500"> <span id="diffThresholdValue">500</span>画素</label>
  </div>
  <p>ドラッグで線を描く / スペースキーでマウス位置からボールを落とす</p>
  <p id="cvStatus">OpenCV.js 読み込み中...</p>
  <p id="contourCountLabel">検出輪郭数: 0</p>
  <p id="diffStatusLabel">差分: -</p>
</div>

<button id="fullscreenExitBtn">終了</button>

<!-- プロジェクタ調整オーバーレイ(四隅ドラッグでキーストーン補正) -->
<div id="calibOverlay">
  <div class="calib-handle" data-corner="0" data-label="左上"></div>
  <div class="calib-handle" data-corner="1" data-label="右上"></div>
  <div class="calib-handle" data-corner="2" data-label="右下"></div>
  <div class="calib-handle" data-corner="3" data-label="左下"></div>
  <div id="calibToolbar">
    <span>四隅を投影面(ホワイトボード)の角に合わせてドラッグしてください</span>
    <button id="calibToggleHandlesBtn">ハンドルを隠す</button>
    <button id="calibResetBtn">リセット</button>
    <button id="calibSaveBtn">保存</button>
    <button id="calibExitBtn">終了</button>
    <span id="calibStatus"></span>
  </div>
  <div id="calibHint">
    斜めから投影したときの台形歪みを補正します。四隅ハンドルを投影面の実際の角に合わせ、「保存」で確定してください。
  </div>
</div>

<div id="cameraPreviewWrap">
  <video id="cameraPreview" autoplay muted playsinline></video>
  <canvas id="roiOverlayCanvas" width="480" height="360"></canvas>
</div>
<canvas id="maskPreviewCanvas" width="160" height="120"></canvas>

<!-- p5.js (CDN) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<!-- matter.js (CDN) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

<!-- opencv.js: 読み込み完了(WASMランタイム初期化完了)を待ってから使う -->
<script>
  window.cvReady = false;
  function onOpenCvReady() {
    cv['onRuntimeInitialized'] = () => {
      window.cvReady = true;
      if (typeof window.handle_cv_ready === 'function') {
        window.handle_cv_ready();
      }
    };
  }
</script>
<script
  async
  src="https://cdn.jsdelivr.net/npm/@techstark/opencv-js@4.10.0-release.1/dist/opencv.js"
  onload="onOpenCvReady();"
  onerror="document.getElementById('cvStatus').textContent = 'OpenCV.jsの読み込みに失敗しました(ネットワーク接続を確認してください)';"
></script>

<!-- 自作コード: STS分割(config/共通 → 変換 → 出力 → 入力 → main)の順に読み込む -->
<script src="js/config.js"></script>
<script src="js/shared_homography.js"></script>
<script src="js/transform/mask.js"></script>
<script src="js/transform/detect.js"></script>
<script src="js/output/physics.js"></script>
<script src="js/output/render.js"></script>
<script src="js/output/status.js"></script>
<script src="js/output/fullscreen.js"></script>
<script src="js/output/projector.js"></script>
<script src="js/output/projection.js"></script>
<script src="js/input/mouse.js"></script>
<script src="js/input/image.js"></script>
<script src="js/input/camera.js"></script>
<script src="js/input/camera_calib.js"></script>
<script src="js/main.js"></script>
</body>
</html>
